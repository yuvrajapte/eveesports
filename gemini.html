<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gem-primary: #00f2ff;
            --gem-secondary: #7000ff;
            --gem-bg: #080a12;
            --gem-card: rgba(15, 20, 35, 0.95);
            --gem-text: #e2e8f0;
            --gem-glow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: transparent;
            font-family: 'Poppins', sans-serif;
            color: var(--gem-text);
        }

        /* Launcher - Enhanced Design */
        #gemini-launcher {
            position: fixed; 
            bottom: 10px; 
            right: 10px;
            width: 60px; 
            height: 60px;
            background: linear-gradient(135deg, var(--gem-secondary), var(--gem-primary));
            border-radius: 18px; /* Squircle look */
            box-shadow: var(--gem-glow);
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 9999; 
            border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            animation: pulse-glow 2s infinite; /* Gaming Breath Effect */
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 242, 255, 0.7); }
            100% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
        }

        #gemini-launcher:hover { 
            transform: translateY(-5px) scale(1.05); 
            border-color: #fff;
        }

        #gemini-launcher i { 
            font-size: 1.6rem; 
            color: #fff;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
        }

        /* Chatbox Design */
        #gemini-chatbox {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 92vw; max-width: 380px;
            height: 85vh; max-height: 580px;
            background: var(--gem-card);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 24px; display: none; flex-direction: column;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            z-index: 10000; opacity: 0; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        #gemini-chatbox.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* Header */
        .gem-header {
            padding: 18px 20px; background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .gem-info h3 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 0.8rem; margin: 0; color: var(--gem-primary);
            letter-spacing: 2px; font-weight: 700;
        }
        .status-tag { font-size: 0.6rem; color: #10b981; display: flex; align-items: center; gap: 6px; margin-top: 5px; font-weight: 600; }
        .gem-dot { width: 7px; height: 7px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

        /* Messages Area */
        #gem-msgs {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 14px;
            scrollbar-width: none;
        }
        #gem-msgs::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 82%; padding: 12px 16px; border-radius: 16px;
            font-size: 0.88rem; line-height: 1.5;
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bot { 
            background: rgba(255, 255, 255, 0.08); 
            align-self: flex-start; border-bottom-left-radius: 4px;
            color: #fff; border: 1px solid rgba(255,255,255,0.05);
        }
        .user { 
            background: linear-gradient(135deg, var(--gem-secondary), #5a00cc); 
            align-self: flex-end; border-bottom-right-radius: 4px;
            color: white; font-weight: 500;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.4);
        }

        /* Input Area */
        .gem-input-wrap {
            padding: 15px 20px; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        #gem-input {
            flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 12px 15px; color: #fff; outline: none;
            transition: 0.3s; font-size: 0.9rem;
        }
        #gem-input:focus { border-color: var(--gem-primary); background: rgba(255,255,255,0.1); }

        #gem-send {
            background: var(--gem-primary); border: none;
            width: 44px; height: 44px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s ease;
        }
        #gem-send:hover { transform: scale(1.1); box-shadow: var(--gem-glow); }
        #gem-send i { color: #000; font-size: 1.1rem; }

        .typing { display: flex; gap: 4px; padding: 12px; }
        .dot { width: 5px; height: 5px; background: var(--gem-primary); border-radius: 50%; animation: pulse 1.5s infinite; opacity: 0.5; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }
    </style>
</head>
<body>

    <div id="gemini-launcher">
        <i class="fas fa-robot"></i> </div>

    <div id="gemini-chatbox">
        <div class="gem-header">
            <div class="gem-info">
                <h3>EVE CORE v2.5</h3>
                <div class="status-tag"><div class="gem-dot"></div> UNIT ONLINE</div>
            </div>
            <i class="fas fa-times" id="gem-close" style="color:rgba(255,255,255,0.4); cursor:pointer; font-size: 1.1rem;"></i>
        </div>
        
        <div id="gem-msgs">
            <div class="msg bot">Authentication Successful. Main EVE Core AI hoon. GGWP! Aaj kya help chahiye?</div>
        </div>

        <div class="gem-input-wrap">
            <input type="text" id="gem-input" placeholder="Enter command..." autocomplete="off">
            <button id="gem-send"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const launcher = document.getElementById('gemini-launcher');
        const chatbox = document.getElementById('gemini-chatbox');
        const closeBtn = document.getElementById('gem-close');
        const sendBtn = document.getElementById('gem-send');
        const inputField = document.getElementById('gem-input');
        const msgsContainer = document.getElementById('gem-msgs');

        launcher.onclick = () => {
            chatbox.classList.add('active');
            launcher.style.display = 'none';
            window.parent.postMessage('expandChat', '*');
        };

        closeBtn.onclick = () => {
            chatbox.classList.remove('active');
            launcher.style.display = 'flex';
            window.parent.postMessage('shrinkChat', '*');
        };

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            msgsContainer.appendChild(div);
            msgsContainer.scrollTop = msgsContainer.scrollHeight;
            return div;
        }

        async function askAI() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputField.value = '';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'msg bot typing';
            loadingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            msgsContainer.appendChild(loadingDiv);
            msgsContainer.scrollTop = msgsContainer.scrollHeight;

            try {
                const API_KEY = "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"; 
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are EVE Core, the ultimate gaming AI for EVE Esports. Use gaming terms like GG, Clutch, OP, Buff, and Nerf. You are helpful, slightly witty, and highly energetic about esports." },
                            { role: "user", content: text }
                        ] 
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiText = data.choices[0].message.content;
                msgsContainer.removeChild(loadingDiv);
                addMessage(aiText, 'bot');
            } catch (err) {
                if (msgsContainer.contains(loadingDiv)) msgsContainer.removeChild(loadingDiv);
                addMessage("Error: System Malfunction. Try again later.", 'bot');
            }
        }

        sendBtn.onclick = askAI;
        inputField.onkeypress = (e) => { if(e.key === 'Enter') askAI(); };
    </script>
</body>
</html>
