<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esports Arena | EVE Esports</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #007bff;
            --bg: #050505;
            --text: #e0e0e0;
            --muted: #888;
            --glow: 0 0 20px rgba(0, 198, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #001a33 0%, #050505 50%, #000000 100%);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            padding-top: 170px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Navbar System --- */
        .navbar-wrapper { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .navbar-pill { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 25px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8); }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .brand-logo { width: 30px; height: 30px; filter: drop-shadow(0 0 5px var(--primary)); }
        .brand-name { color: #fff; font-weight: 900; font-size: 0.9rem; letter-spacing: 2px; }
        .nav-user-pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; box-shadow: var(--glow); transition: 0.3s; }
        
        .mini-nav { display: flex; gap: 18px; margin-top: 12px; padding: 10px 30px; background: var(--glass); backdrop-filter: blur(8px); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .mini-nav a { color: var(--primary); text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .mini-nav a:hover { color: #fff; text-shadow: var(--glow); }

        /* --- Content Layout --- */
        section { width: 100%; max-width: 900px; padding: 60px 20px; text-align: center; }
        
        .header-container { text-align: center; margin-bottom: 40px; }
        .section-title { 
            font-size: 2.8rem; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(180deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; line-height: 1;
        }
        .title-underline { width: 60px; height: 4px; background: var(--primary); margin: 15px auto; border-radius: 10px; box-shadow: var(--glow); }
        .section-desc { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; }

        /* --- Arena Card Style --- */
        .arena-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 80px 40px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .arena-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cyber-network.png');
            opacity: 0.05;
            pointer-events: none;
        }
        .arena-card:hover {
            border-color: var(--primary);
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 198, 255, 0.1);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 198, 255, 0.2);
        }
        .status-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- Fixed Scroll Top Button --- */
        #scrollTopBtn { 
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: #fff; border: none; border-radius: 50%; display: none; 
            justify-content: center; align-items: center; z-index: 2000; 
            cursor: pointer; box-shadow: var(--glow); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #scrollTopBtn i { font-size: 1.2rem; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; }
        #scrollTopBtn:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 0 30px rgba(0, 198, 255, 0.8); }

        /* --- Footer --- */
        .footer-section { padding: 60px 0; text-align: center; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto; }
        .social-link { color: var(--muted); font-size: 1.2rem; margin: 0 15px; transition: 0.3s; text-decoration: none; display: inline-block; }
        .social-link:hover { color: var(--primary); transform: translateY(-3px); }

        @media (max-width: 768px) {
            body { padding-top: 150px; }
            .section-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <button onclick="topFunction()" id="scrollTopBtn"><i class="fas fa-chevron-up"></i></button>

    <header class="navbar-wrapper">
        <nav class="navbar-pill">
            <div class="nav-brand">
                <img src="https://res.cloudinary.com/ddbqinirs/image/upload/f_auto,q_auto/1719071244310_o99nod" class="brand-logo">
                <span class="brand-name">EVE ESPORTS</span>
            </div>
            <div id="auth-section">
                <a href="index.html" style="background:var(--primary); color:#000; padding:8px 20px; border-radius:50px; font-weight:800; font-size:0.7rem; text-decoration:none;" id="login-btn">LOGIN</a>
                <div id="user-display" style="display: none; align-items:center; gap:10px;">
                    <img src="" id="nav-pfp" class="nav-user-pfp">
                    <i class="fas fa-power-off" id="nav-logout" style="color:var(--muted); cursor:pointer; font-size:0.9rem;"></i>
                </div>
            </div>
        </nav>
        <div class="mini-nav">
            <a href="home.html">Home</a>
            <a href="esports.html" style="color:#fff; text-shadow: var(--glow);">Esports</a>
            <a href="halloffame.html">Honours</a>
            <a href="supportpage.html">Support</a>
        </div>
    </header>

    <section>
        <div class="header-container">
            <p class="section-desc">Competitive Hub</p>
            <h1 class="section-title">Esports Arena</h1>
            <div class="title-underline"></div>
        </div>

        <div class="arena-card">
            <div class="status-pill">
                <div class="status-dot"></div>
                Development Phase
            </div>
            <h2 style="color: #fff; font-size: 1.5rem; font-weight: 800; text-transform: uppercase;">Incoming Transmission</h2>
            <p style="color: var(--muted); font-size: 0.85rem; margin-top: 15px; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6;">
                The core competitive module is being calibrated. We are building a space where legends are forged and stats define glory. Stay tuned.
            </p>
        </div>
    </section>

    <footer class="footer-section">
        <div style="margin-bottom: 25px;">
            <a href="https://instagram.com/eveesports.in" class="social-link"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
            <a href="https://youtube.com/eveesports" class="social-link"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="font-size: 0.6rem; color: #444; letter-spacing: 2px;">© 2024 EVE ESPORTS • THE ARENA AWAITS</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdW7ibzhb2O2y3XESRY1gNtOJDZGXQvbo",
            authDomain: "eve-esports-login.firebaseapp.com",
            projectId: "eve-esports-login",
            storageBucket: "eve-esports-login.firebasestorage.app",
            messagingSenderId: "886917494008",
            appId: "1:886917494008:web:5486a96b14f253ed6cf70d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-display').style.display = 'flex';
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    document.getElementById('nav-pfp').src = snap.data().pfp || "https://i.ibb.co/6NG877M/default-avatar.png";
                }
            } else {
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-display').style.display = 'none';
            }
        });

        document.getElementById('nav-logout').onclick = () => signOut(auth).then(() => location.reload());
    </script>

    <script>
        let b = document.getElementById("scrollTopBtn");
        window.onscroll = function() {
            if (window.scrollY > 300) b.style.display = "flex"; else b.style.display = "none";
        };
        function topFunction() { window.scrollTo({top: 0, behavior: 'smooth'}); }
    </script>
</body>
</html>
