<!DOCTYPE html>
<html lang="en">

<body>

<!-- LOADER (INSIDE BODY) -->
<div id="loader">

<!-- FOOTER -->
<div class="footer-legal">

<!-- JS -->
<script>
function startLoading() {
    document.getElementById("loader").style.display = "flex";

    setTimeout(() => {
        window.location.href = "home.html";
    }, 2500);
}
</script>
