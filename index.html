<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVE Esports | Pro Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #007bff;
            --bg: #050505;
            --text: #e0e0e0;
            --muted: #888;
            --glow: 0 0 20px rgba(0, 198, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #001a33 0%, #050505 50%, #000000 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* --- Modern Login Card --- */
        .login-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PFP Section --- */
        .pfp-container {
            position: relative; width: 100px; height: 100px; margin: 0 auto 20px auto;
            border-radius: 50%; border: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            overflow: hidden; transition: 0.3s; background: var(--glass);
            box-shadow: var(--glow);
        }
        .pfp-container:hover { transform: scale(1.05); border-color: #fff; }
        .pfp-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .pfp-icon { font-size: 1.5rem; color: var(--primary); }
        #pfp-input { display: none; }

        .form-logo { width: 60px; height: 60px; margin: 0 auto 15px auto; filter: drop-shadow(0 0 10px var(--primary)); }
        
        h2 { font-weight: 900; font-size: 1.8rem; letter-spacing: 1px; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        /* --- Inputs --- */
        .field-wrapper { margin-bottom: 12px; }
        input { 
            width: 100%; padding: 14px 18px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; color: #fff; font-size: 0.85rem; 
            transition: 0.3s; 
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0, 198, 255, 0.05); box-shadow: var(--glow); }

        /* --- Buttons --- */
        .primary-btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            font-weight: 800; cursor: pointer; margin-top: 10px;
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; text-transform: uppercase; letter-spacing: 1px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 198, 255, 0.4); }

        .google-btn { 
            width: 100%; padding: 12px; margin-top: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass); 
            color: #fff; display: flex; align-items: center; justify-content: center; 
            gap: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s;
        }
        .google-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        .toggle-mode { margin-top: 20px; font-size: 0.8rem; color: var(--muted); }
        #switch-mode { color: var(--primary); cursor: pointer; font-weight: 700; margin-left: 5px; }
        #forgot-link { display: block; margin-top: 10px; color: var(--muted); cursor: pointer; transition: 0.3s; font-size: 0.75rem; }
        #forgot-link:hover { color: var(--primary); }

        /* --- Modal & Loader --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 90%; max-width: 350px; text-align: center; }
        
        #loader { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,198,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid var(--primary); color: #fff; padding: 12px 25px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: none; z-index: 300; box-shadow: var(--glow); }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div id="toast"></div>

<div class="login-card">
    <img src="https://res.cloudinary.com/ddbqinirs/image/upload/f_auto,q_auto/1719071244310_o99nod" id="main-logo" class="form-logo">
    
    <div id="pfp-section" style="display: none;">
        <label for="pfp-input" class="pfp-container" id="pfp-label">
            <span class="pfp-icon" id="plus-icon"><i class="fas fa-camera"></i></span>
            <img id="pfp-preview" class="pfp-preview">
        </label>
        <input type="file" id="pfp-input" accept="image/*">
    </div>

    <h2 id="title">EVE ESPORTS</h2>
    <p class="subtitle" id="subtitle">The Elite Gaming Hub</p>

    <div id="form-fields">
        <div id="signup-extra" style="display: none;">
            <div class="field-wrapper"><input type="text" id="fullname" placeholder="Full Name"></div>
            <div class="field-wrapper"><input type="text" id="username" placeholder="Username"></div>
        </div>
        <div class="field-wrapper"><input type="email" id="email" placeholder="Email Address"></div>
        <div class="field-wrapper"><input type="password" id="password" placeholder="Password"></div>
    </div>

    <button class="primary-btn" id="mainBtn">Login</button>
    
    <button class="google-btn" id="googleBtn">
        <img src="https://i.ibb.co/1Y1KQ9c8/75ad255ebbf47f949a79efa26e28cbbe-1-removebg-preview.png" width="18"> 
        <span>Sign in with Google</span>
    </button>

    <div class="toggle-mode">
        <span id="toggle-text">New to the arena?</span> <span id="switch-mode">Join Now</span>
        <span id="forgot-link">Recover Access?</span>
    </div>
</div>

<div id="forgot-modal" class="modal">
    <div class="modal-content">
        <i class="fas fa-key" style="color:var(--primary); font-size: 2rem; margin-bottom: 15px;"></i>
        <h3 style="color:#fff; margin-bottom:10px; text-transform: uppercase;">Reset Password</h3>
        <p style="color: var(--muted); font-size: 0.7rem; margin-bottom: 20px;">We'll send a secure link to your email.</p>
        <input type="email" id="reset-email" placeholder="Registered Email" style="margin-bottom:15px;">
        <button class="primary-btn" id="sendReset" style="padding:12px;">Send Link</button>
        <p onclick="document.getElementById('forgot-modal').style.display='none'" style="margin-top:20px; cursor:pointer; font-size:0.8rem; color: var(--muted);">Go Back</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdW7ibzhb2O2y3XESRY1gNtOJDZGXQvbo",
        authDomain: "eve-esports-login.firebaseapp.com",
        projectId: "eve-esports-login",
        storageBucket: "eve-esports-login.firebasestorage.app",
        messagingSenderId: "886917494008",
        appId: "1:886917494008:web:5486a96b14f253ed6cf70d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;
    let base64Image = "";

    const switchBtn = document.getElementById('switch-mode');
    const pfpSection = document.getElementById('pfp-section');
    const mainLogo = document.getElementById('main-logo');
    const pfpInput = document.getElementById('pfp-input');
    const pfpPreview = document.getElementById('pfp-preview');
    const plusIcon = document.getElementById('plus-icon');
    const loader = document.getElementById('loader');

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    pfpInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                base64Image = event.target.result;
                pfpPreview.src = base64Image;
                pfpPreview.style.display = 'block';
                plusIcon.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    switchBtn.onclick = () => {
        isLogin = !isLogin;
        document.getElementById('signup-extra').style.display = isLogin ? 'none' : 'block';
        pfpSection.style.display = isLogin ? 'none' : 'block';
        mainLogo.style.display = isLogin ? 'block' : 'none';
        document.getElementById('title').innerText = isLogin ? 'EVE ESPORTS' : 'JOIN ARENA';
        document.getElementById('subtitle').innerText = isLogin ? 'The Elite Gaming Hub' : 'Create your pro profile';
        document.getElementById('mainBtn').innerText = isLogin ? 'Login' : 'Create Account';
        document.getElementById('toggle-text').innerText = isLogin ? 'New to the arena?' : 'Already a member?';
        switchBtn.innerText = isLogin ? 'Join Now' : 'Login Instead';
        document.getElementById('forgot-link').style.display = isLogin ? 'block' : 'none';
    };

    document.getElementById('forgot-link').onclick = () => document.getElementById('forgot-modal').style.display = 'flex';

    document.getElementById('sendReset').onclick = async () => {
        const email = document.getElementById('reset-email').value;
        if(!email) return showToast("Enter email!");
        try {
            await sendPasswordResetEmail(auth, email);
            showToast("Reset link sent!");
            document.getElementById('forgot-modal').style.display = 'none';
        } catch(e) { showToast("Error sending link"); }
    };

    document.getElementById('mainBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return showToast("Missing credentials!");

        loader.style.display = 'flex';
        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                const name = document.getElementById('fullname').value;
                const username = document.getElementById('username').value;
                if(!name || !username) {
                    loader.style.display = 'none';
                    return showToast("Fill all fields!");
                }
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, "users", userCred.user.uid), {
                    name: name,
                    username: username,
                    email: email,
                    pfp: base64Image || "https://i.ibb.co/6NG877M/default-avatar.png",
                    createdAt: new Date()
                });
            }
            window.location.href = "home.html";
        } catch(e) {
            loader.style.display = 'none';
            showToast(e.code.split('/')[1].replace(/-/g, ' '));
        }
    };

    document.getElementById('googleBtn').onclick = async () => {
        loader.style.display = 'flex';
        try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                await setDoc(docRef, {
                    name: user.displayName,
                    username: user.email.split('@')[0],
                    email: user.email,
                    pfp: user.photoURL || "https://i.ibb.co/6NG877M/default-avatar.png",
                    createdAt: new Date()
                });
            }
            window.location.href = "home.html";
        } catch(e) { 
            loader.style.display = 'none';
            showToast("Google Login Failed"); 
        }
    };
</script>
</body>
</html>
