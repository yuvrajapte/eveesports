<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Esports - Elite Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/c135079867.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --primary: #00cbff;
            --secondary: #007bff;
            --bg-dark: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.8);
            --text-gray: #8892b0;
            --error: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background Gradient */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 203, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
            animation: moveBg 15s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            0% { transform: translate(-25%, -25%); }
            50% { transform: translate(0%, 0%); }
            100% { transform: translate(-25%, -25%); }
        }

        .hero {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem 2.5rem;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-logo {
            width: 80px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 203, 255, 0.6));
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .field-wrapper {
            margin-bottom: 1rem;
            text-align: left;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 203, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 203, 255, 0.15);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 5px;
            margin-left: 5px;
            height: 14px;
        }

        .action-buttons {
            margin-top: 1.5rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.5);
        }

        .google-btn {
            background: #fff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 1rem;
        }

        .google-btn:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        .google-btn img { width: 20px; }

        .separator {
            margin: 1.8rem 0;
            display: flex;
            align-items: center;
            color: #444;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .separator::before, .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 15px;
        }

        .toggle-mode {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        #switch-mode {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        #switch-mode:hover { text-decoration: underline; }

        #forgot-link {
            display: block;
            margin-top: 0.8rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            place-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: #1e1e26;
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }

        .toast.error { border-left-color: var(--error); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 203, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" style="display:none;">
    <div class="spinner"></div>
    <p id="loader-text" style="margin-top: 15px; letter-spacing: 2px; font-size: 0.8rem;">SYNCING WITH ARENA...</p>
</div>

<section class="hero">
    <div class="login-card" id="auth-card">
        <img src="https://i.ibb.co/gbnpdhJ3/1719071244310.png" alt="EVE Logo" class="form-logo">
        <h2 id="form-title">RISE WITH EVE</h2>
        <p class="subtitle" id="form-subtitle">Enter the arena to dominate</p>

        <div class="input-group" id="form-fields">
            <div class="field-wrapper" id="name-wrapper" style="display:none;">
                <input type="text" id="fullname" placeholder="Full Name">
                <small class="error-msg" id="name-error"></small>
            </div>
            
            <div class="field-wrapper" id="user-wrapper" style="display:none;">
                <input type="text" id="username" placeholder="Username">
                <small class="error-msg" id="user-error"></small>
            </div>

            <div class="field-wrapper">
                <input type="email" id="email" placeholder="Email Address">
                <small class="error-msg" id="email-error"></small>
            </div>

            <div class="field-wrapper">
                <input type="password" id="password" placeholder="Password">
                <small class="error-msg" id="pass-error"></small>
            </div>

            <div class="field-wrapper" id="confirm-wrapper" style="display:none;">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <small class="error-msg" id="confirm-error"></small>
            </div>
        </div>

        <div class="action-buttons">
            <button class="primary-btn" id="mainBtn">Login</button>
            <div class="separator"><span>Secure Access</span></div>
            <button class="google-btn" id="googleBtn">
                <img src="https://i.ibb.co/1Y1KQ9c8/75ad255ebbf47f949a79efa26e28cbbe-1-removebg-preview.png" alt="G">
                Sign in with Google
            </button>
        </div>

        <div class="toggle-mode">
            <p id="toggle-text">Don't have an account? <span id="switch-mode">Create Account</span></p>
            <a href="#" id="forgot-link">Forgot Password?</a>
        </div>
    </div>
</section>

<div id="forgot-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:10px">Reset Password</h3>
        <p class="subtitle">Enter email to receive reset link</p>
        <input type="email" id="reset-email" placeholder="Registered Email" style="margin-bottom:15px">
        <div class="modal-btns">
            <button class="primary-btn" id="send-reset">Send Link</button>
            <button class="secondary-btn" id="close-modal" style="background:transparent; color: #8892b0; margin-top:10px">Cancel</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdW7ibzhb2O2y3XESRY1gNtOJDZGXQvbo",
        authDomain: "eve-esports-login.firebaseapp.com",
        projectId: "eve-esports-login",
        storageBucket: "eve-esports-login.firebasestorage.app",
        messagingSenderId: "886917494008",
        appId: "1:886917494008:web:5486a96b14f253ed6cf70d",
        measurementId: "G-V9PRSS4841"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isLoginMode = true;

    const mainBtn = document.getElementById('mainBtn');
    const switchMode = document.getElementById('switch-mode');
    const loader = document.getElementById('loader');
    const googleBtn = document.getElementById('googleBtn');

    function showToast(msg, type = "success") {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : ''}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function clearErrors() {
        document.querySelectorAll('.error-msg').forEach(el => el.innerText = "");
    }

    function goToHome() {
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1200);
    }

    switchMode.onclick = (e) => {
        isLoginMode = !isLoginMode;
        
        document.getElementById('name-wrapper').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('user-wrapper').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('confirm-wrapper').style.display = isLoginMode ? 'none' : 'block';
        
        document.getElementById('form-title').innerText = isLoginMode ? 'RISE WITH EVE' : 'JOIN EVE ARENA';
        document.getElementById('form-subtitle').innerText = isLoginMode ? 'Enter the arena to dominate' : 'Create your legend today';
        
        mainBtn.innerText = isLoginMode ? 'Login' : 'Sign Up';
        switchMode.innerText = isLoginMode ? 'Create Account' : 'Login Instead';
        clearErrors();
    };

    mainBtn.onclick = async (e) => {
        e.preventDefault();
        clearErrors();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showToast("Required fields are empty", "error");
            return;
        }

        loader.style.display = 'flex';

        try {
            if (isLoginMode) {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Access Granted. Welcome back!");
                goToHome();
            } else {
                const name = document.getElementById('fullname').value.trim();
                const username = document.getElementById('username').value.trim();
                const confirm = document.getElementById('confirmPassword').value;

                if (password !== confirm) {
                    loader.style.display = 'none';
                    document.getElementById('confirm-error').innerText = "Passwords do not match";
                    return;
                }

                const res = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", res.user.uid), {
                    name, username, email, createdAt: new Date()
                });
                showToast("Account Initialized!");
                goToHome();
            }
        } catch (err) {
            loader.style.display = 'none';
            showToast(err.code.replace('auth/', '').replace(/-/g, ' '), "error");
        }
    };

    googleBtn.onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
            showToast("Google Authentication Success!");
            goToHome();
        } catch (err) {
            showToast("Authentication Failed", "error");
        }
    };

    document.getElementById('send-reset').onclick = async () => {
        const email = document.getElementById('reset-email').value;
        if(!email) return showToast("Email is required", "error");
        try {
            await sendPasswordResetEmail(auth, email);
            showToast("Reset link dispatched!");
            document.getElementById('forgot-modal').style.display = 'none';
        } catch (err) {
            showToast("Reset failed", "error");
        }
    };

    document.getElementById('forgot-link').onclick = (e) => {
        e.preventDefault();
        document.getElementById('forgot-modal').style.display = 'grid';
    };

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('forgot-modal').style.display = 'none';
    };
</script>

</body>
</html>
